name: Build and Release Doc Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    strategy:
      matrix:
        os: [macos-13, macos-14]  # Intel and Silicon runners
        arch: [x86_64, arm64]
        exclude:
          - os: macos-13
            arch: arm64
          - os: macos-14
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1  # Optimize clone speed
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: ${{ matrix.arch }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies
        python3 -m pip install --upgrade \
          pyinstaller \
          pyobjc-framework-Cocoa \
          python-docx \
          tkinter

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.arch }}"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
        
        # Debug: Print build directory
        echo "Build directory: $BUILD_DIR"
        ls -la build/

    - name: Build macOS Executable
      env:
        MACOS_ARCH: ${{ matrix.arch }}
        OS_VERSION: ${{ matrix.os }}
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/${OS_VERSION}-${MACOS_ARCH}"
        mkdir -p "$BUILD_DIR"
        
        # Verify build directory
        echo "Build directory: $BUILD_DIR"
        if [ ! -d "$BUILD_DIR" ]; then
          echo "Error: Build directory could not be created"
          exit 1
        fi

        # Determine architecture-specific build parameters
        if [ "$MACOS_ARCH" == "arm64" ]; then
          ARCH_FLAGS="arch -arm64"
          MIN_OS_VERSION="11.0"
        else
          ARCH_FLAGS=""
          MIN_OS_VERSION="10.15"
        fi

        # Change to build directory
        cd "$BUILD_DIR" || exit 1
        
        $ARCH_FLAGS python -m PyInstaller \
          --name "Doc-Converter" \
          --windowed \
          --target-arch $MACOS_ARCH \
          --add-data "../../assets:assets" \
          --min-macos-version $MIN_OS_VERSION \
          ../../doc_converter_gui.py

        # Create proper app bundle structure
        mkdir -p "Doc-Converter.app/Contents/MacOS"
        mkdir -p "Doc-Converter.app/Contents/Resources"
        mkdir -p "Doc-Converter.app/Contents/Frameworks"

        # Find and move executable
        EXECUTABLE=$(find dist -type f | xargs file | grep "Mach-O.*executable" | cut -d: -f1)
        if [ -z "$EXECUTABLE" ]; then
          echo "Error: No executable found"
          find dist -type f | xargs file
          exit 1
        fi
        
        cp "$EXECUTABLE" "Doc-Converter.app/Contents/MacOS/Doc-Converter"
        chmod +x "Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        # Copy supporting libraries
        find dist -type f \( -name "*.so" -o -name "*.dylib" \) -exec cp {} "Doc-Converter.app/Contents/Frameworks/" \;
        
        # Create Info.plist
        cat > "Doc-Converter.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app</string>
            <key>CFBundleName</key>
            <string>Doc-Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>$MIN_OS_VERSION</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
        </dict>
        </plist>
        EOF

        # Code signing with ad-hoc identity
        codesign --force --deep --sign - \
          --options runtime \
          --timestamp=none \
          "Doc-Converter.app"

        # Create distributable zip
        ditto -c -k --keepParent "Doc-Converter.app" "Doc-Converter-${OS_VERSION}-${MACOS_ARCH}.app.zip"

        # Verify zip file exists
        if [ ! -f "Doc-Converter-${OS_VERSION}-${MACOS_ARCH}.app.zip" ]; then
          echo "Error: Zip file was not created"
          exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-${{ matrix.os }}-${{ matrix.arch }}
        path: build/${{ matrix.os }}-${{ matrix.arch }}/Doc-Converter-${{ matrix.os }}-${{ matrix.arch }}.app.zip
        retention-days: 7

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.app.zip
        tag_name: v1.0.${{ github.run_number }}
        generate_release_notes: true
