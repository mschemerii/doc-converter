name: Build and Release Doc Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos-intel:
    runs-on: macos-13
    steps:
    - name: Upgrade Git
      run: |
        brew update
        brew upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: x64
        cache: 'pip'

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies with specific versions
        python3 -m pip install \
          'pyinstaller==6.11.1' \
          'pyobjc-framework-Cocoa==10.2' \
          'python-docx==1.0.1' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Install Tkinter for macOS
        brew install python-tk@3.10
        # Explicitly link Tkinter
        ln -s /usr/local/opt/python@3.10/Frameworks/Python.framework/Versions/3.10/lib/python3.10/tkinter /Users/runner/hostedtoolcache/Python/3.10.15/x64/lib/python3.10/tkinter
        python3 -m pip install tk

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/macos-intel-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

    - name: Build macOS Intel Executable
      env:
        MACOS_ARCH: x86_64
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-intel-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Build command with additional flags for macOS
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Intel" \
          --distpath "$BUILD_DIR" \
          --add-binary "/System/Library/Frameworks/Tk.framework/Tk:Tk" \
          --add-binary "/System/Library/Frameworks/Tcl.framework/Tcl:Tcl" \
          doc_converter_gui.py

    - name: Prepare macOS Intel Artifact
      run: |
        # Navigate to build directory
        cd build/macos-intel-py3.10
        
        # Verify .app bundle structure
        if [ ! -d "Doc-Converter-Intel.app" ]; then
          echo "Error: .app bundle not found"
          exit 1
        fi
        
        # Check for executable
        if [ ! -x "Doc-Converter-Intel.app/Contents/MacOS/Doc-Converter-Intel" ]; then
          echo "Error: Executable not found or not executable"
          exit 1
        fi
        
        # Repair .app bundle permissions
        chmod -R 755 "Doc-Converter-Intel.app"
        
        # Create a zip of the entire .app bundle with full path preservation
        tar -czvf "../Doc-Converter-Intel.tar.gz" "Doc-Converter-Intel.app"
        
        # Verify tar contents
        tar -tzvf "../Doc-Converter-Intel.tar.gz"
        
        # Additional diagnostics
        ls -la "Doc-Converter-Intel.app/Contents/MacOS"
        otool -L "Doc-Converter-Intel.app/Contents/MacOS/Doc-Converter-Intel"

    - name: Upload macOS Intel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-intel
        path: build/Doc-Converter-Intel.tar.gz
        retention-days: 7

  build-macos-silicon:
    runs-on: macos-14
    steps:
    - name: Upgrade Git
      run: |
        brew update
        brew upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies with specific versions
        arch -x86_64 python3 -m pip install \
          'pyinstaller==6.11.1' \
          'pyobjc-framework-Cocoa==10.2' \
          'python-docx==1.0.1' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Install Tkinter for macOS
        brew install python-tk@3.10
        # Create tkinter directory if it doesn't exist
        mkdir -p /Users/runner/hostedtoolcache/Python/3.10.15/arm64/lib/python3.10/
        # Explicitly link Tkinter
        ln -s /opt/homebrew/Cellar/python-tk@3.10/3.10.15_1/libexec/tkinter /Users/runner/hostedtoolcache/Python/3.10.15/arm64/lib/python3.10/tkinter
        python3 -m pip install tk

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        arch -x86_64 python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        arch -x86_64 python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/macos-silicon-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

    - name: Build macOS Silicon Executable
      env:
        MACOS_ARCH: arm64
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-silicon-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Build command with additional flags for macOS
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Silicon" \
          --distpath "$BUILD_DIR" \
          --add-binary "/System/Library/Frameworks/Tk.framework/Tk:Tk" \
          --add-binary "/System/Library/Frameworks/Tcl.framework/Tcl:Tcl" \
          doc_converter_gui.py

    - name: Prepare macOS Silicon Artifact
      run: |
        # Navigate to build directory
        cd build/macos-silicon-py3.10
        
        # Verify .app bundle structure
        if [ ! -d "Doc-Converter-Silicon.app" ]; then
          echo "Error: .app bundle not found"
          exit 1
        fi
        
        # Check for executable
        if [ ! -x "Doc-Converter-Silicon.app/Contents/MacOS/Doc-Converter-Silicon" ]; then
          echo "Error: Executable not found or not executable"
          exit 1
        fi
        
        # Repair .app bundle permissions
        chmod -R 755 "Doc-Converter-Silicon.app"
        
        # Create a zip of the entire .app bundle with full path preservation
        tar -czvf "../Doc-Converter-Silicon.tar.gz" "Doc-Converter-Silicon.app"
        
        # Verify tar contents
        tar -tzvf "../Doc-Converter-Silicon.tar.gz"
        
        # Additional diagnostics
        ls -la "Doc-Converter-Silicon.app/Contents/MacOS"
        otool -L "Doc-Converter-Silicon.app/Contents/MacOS/Doc-Converter-Silicon"

    - name: Upload macOS Silicon Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-silicon
        path: build/Doc-Converter-Silicon.tar.gz
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - architecture: x64

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.architecture }}
        cache: 'pip'

    - name: Install system dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install `
          pyinstaller==6.11.1 `
          pywin32==306 `
          python-docx==1.0.1 `
          lxml==4.9.3

    - name: Install project dependencies
      run: |
        python -m pip install -r requirements.txt --no-deps
        python -m pip list

    - name: Prepare Build Environment
      run: |
        mkdir build\windows-${{ matrix.architecture }}

    - name: Build Windows Executable
      shell: pwsh
      run: |
        # Remove existing build directory if it exists
        if (Test-Path "build\windows-${{ matrix.architecture }}") {
          Remove-Item -Path "build\windows-${{ matrix.architecture }}" -Recurse -Force
        }
        
        # Create clean build directory
        New-Item -Path "build\windows-${{ matrix.architecture }}" -ItemType Directory -Force

        # Build executable
        pyinstaller --clean --noconfirm --windowed `
          --name "Doc-Converter-Windows-${{ matrix.architecture }}" `
          --distpath "build\windows-${{ matrix.architecture }}" `
          doc_converter_gui.py

    - name: Prepare Windows Artifact
      shell: pwsh
      run: |
        # Navigate to build directory
        Set-Location "build\windows-${{ matrix.architecture }}"
        
        # Find the executable
        $exeFiles = Get-ChildItem -Path . -Recurse -Include "*.exe"
        
        if ($exeFiles.Count -eq 0) {
          Write-Error "No executable found in build directory"
          exit 1
        }
        
        # Compress the executable
        Compress-Archive -Path $exeFiles[0].FullName -DestinationPath "..\Doc-Converter-Windows-${{ matrix.architecture }}.zip"
        
        # List contents of zip for verification
        Expand-Archive -Path "..\Doc-Converter-Windows-${{ matrix.architecture }}.zip" -DestinationPath ".\extracted" -Force
        Get-ChildItem -Path ".\extracted"

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows-${{ matrix.architecture }}
        path: build\Doc-Converter-Windows-${{ matrix.architecture }}.zip
        retention-days: 7
        if-no-files-found: error

  release:
    needs: [build-macos-intel, build-macos-silicon, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
