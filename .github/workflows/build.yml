  create-release:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
      - build-oracle-linux-8
      - build-oracle-linux-9
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
