name: Build and Release Document Converter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      shell: pwsh
      run: |
        # Get current Python version
        $pythonVersions = python -c "import sys; print(sys.version)"
        Write-Host "Current Python version: $pythonVersions"
        
        # List Python installations
        $env:Path -split ';' | Where-Object { $_ -like '*Python*' } | ForEach-Object {
          $pythonPath = $_
          Write-Host "Checking Python installations in $pythonPath"
          Get-ChildItem "$pythonPath\python*.exe" | ForEach-Object { 
            & $_.FullName --version
          }
        }
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --windowed --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-windows
        cp dist/Doc-Converter.exe artifacts/doc_converter-windows/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows/Doc-Converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --windowed --onefile --osx-bundle-identifier com.example.docconverter --target-architecture x86_64 doc_converter_gui.py
        mkdir -p "dist/Doc-Converter.app/Contents/MacOS"
        mv "dist/Doc-Converter" "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        mkdir -p artifacts/doc_converter-macos-intel
        cp -R "dist/Doc-Converter.app" "artifacts/doc_converter-macos-intel/Doc-Converter.app"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-intel
        path: artifacts/doc_converter-macos-intel/Doc-Converter.app
  
  build-macos-silicon:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'arm64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --windowed --onefile --osx-bundle-identifier com.example.docconverter --target-architecture arm64 doc_converter_gui.py
        mkdir -p "dist/Doc-Converter.app/Contents/MacOS"
        mv "dist/Doc-Converter" "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        mkdir -p artifacts/doc_converter-macos-silicon
        cp -R "dist/Doc-Converter.app" "artifacts/doc_converter-macos-silicon/Doc-Converter.app"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon/Doc-Converter.app
  
  build-oracle-linux-8:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:8
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y python3 python3-pip gcc make

    - name: List Python version
      run: |
        python3 --version
        pip3 --version

    - name: Install project dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build executable
      run: |
        python3 -m PyInstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ol8
        cp dist/Doc-Converter artifacts/doc_converter-ol8/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol8
        path: artifacts/doc_converter-ol8/Doc-Converter

  build-oracle-linux-9:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:9
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y python3 python3-pip gcc make

    - name: List Python version
      run: |
        python3 --version
        pip3 --version

    - name: Install project dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build executable
      run: |
        python3 -m PyInstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ol9
        cp dist/Doc-Converter artifacts/doc_converter-ol9/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol9
        path: artifacts/doc_converter-ol9/Doc-Converter

  build-ubuntu-24-04:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-24-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-24-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-24-04
        path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter

  build-ubuntu-22-04:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-22-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-22-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-22-04
        path: artifacts/doc_converter-ubuntu-22-04/Doc-Converter

  build-ubuntu-20-04:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-20-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-20-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter

  create-release:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
      - build-oracle-linux-8
      - build-oracle-linux-9
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Generate release tag
      id: tag
      shell: bash
      run: |
        TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
        echo "::set-output name=tag_name::${TAG_NAME}"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        release_name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload Windows Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
        asset_name: Doc-Converter-Windows-${{ steps.tag.outputs.tag_name }}.exe
        asset_content_type: application/octet-stream

    - name: Prepare macOS Intel Artifact for Upload
      run: |
        # Extensive debugging of artifact location and structure
        echo "Current workspace:"
        pwd
        
        echo "Listing all directories in artifacts:"
        find artifacts -type d
        
        echo "Detailed listing of doc_converter-macos-intel:"
        ls -laR "artifacts/doc_converter-macos-intel"
        
        echo "Find command on artifacts:"
        find artifacts -name "Doc-Converter*"
        
        # Verify artifact contents
        MACOS_INTEL_ARTIFACT_DIR="artifacts/doc_converter-macos-intel"
        
        echo "Checking artifact directory contents:"
        if [ -d "$MACOS_INTEL_ARTIFACT_DIR" ]; then
          echo "Directory exists"
          ls -la "$MACOS_INTEL_ARTIFACT_DIR"
        else
          echo "ERROR: Artifact directory does not exist"
          exit 1
        fi
        
        # Attempt to locate the executable
        echo "Searching for executable:"
        find "$MACOS_INTEL_ARTIFACT_DIR" -type f -name "Doc-Converter"
        
        # Create proper .app bundle structure
        mkdir -p "Doc-Converter-Intel.app/Contents/MacOS"
        mkdir -p "Doc-Converter-Intel.app/Contents/Resources"
        
        # Find and copy executable
        EXECUTABLE=$(find "$MACOS_INTEL_ARTIFACT_DIR" -type f -name "Doc-Converter" | head -n 1)
        
        if [ -z "$EXECUTABLE" ]; then
          echo "ERROR: No executable found"
          exit 1
        fi
        
        echo "Found executable: $EXECUTABLE"
        cp "$EXECUTABLE" "Doc-Converter-Intel.app/Contents/MacOS/Doc-Converter"
        
        # Create zip of the .app bundle
        zip -r "artifacts/doc_converter-macos-intel/Doc-Converter-Intel.zip" "Doc-Converter-Intel.app"
        
        # Verify archive creation
        echo "Compressed archive details:"
        ls -la "artifacts/doc_converter-macos-intel/Doc-Converter-Intel.zip"
        
        # Show zip contents
        unzip -l "artifacts/doc_converter-macos-intel/Doc-Converter-Intel.zip"

    - name: Upload macOS Intel Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.zip
        asset_name: Doc-Converter-Intel-${{ steps.tag.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Prepare macOS Silicon Artifact for Upload
      run: |
        # Extensive debugging of artifact location and structure
        echo "Current workspace:"
        pwd
        
        echo "Listing all directories in artifacts:"
        find artifacts -type d
        
        echo "Detailed listing of doc_converter-macos-silicon:"
        ls -laR "artifacts/doc_converter-macos-silicon"
        
        echo "Find command on artifacts:"
        find artifacts -name "Doc-Converter*"
        
        # Verify artifact contents
        MACOS_SILICON_ARTIFACT_DIR="artifacts/doc_converter-macos-silicon"
        
        echo "Checking artifact directory contents:"
        if [ -d "$MACOS_SILICON_ARTIFACT_DIR" ]; then
          echo "Directory exists"
          ls -la "$MACOS_SILICON_ARTIFACT_DIR"
        else
          echo "ERROR: Artifact directory does not exist"
          exit 1
        fi
        
        # Attempt to locate the executable
        echo "Searching for executable:"
        find "$MACOS_SILICON_ARTIFACT_DIR" -type f -name "Doc-Converter"
        
        # Create proper .app bundle structure
        mkdir -p "Doc-Converter-Silicon.app/Contents/MacOS"
        mkdir -p "Doc-Converter-Silicon.app/Contents/Resources"
        
        # Find and copy executable
        EXECUTABLE=$(find "$MACOS_SILICON_ARTIFACT_DIR" -type f -name "Doc-Converter" | head -n 1)
        
        if [ -z "$EXECUTABLE" ]; then
          echo "ERROR: No executable found"
          exit 1
        fi
        
        echo "Found executable: $EXECUTABLE"
        cp "$EXECUTABLE" "Doc-Converter-Silicon.app/Contents/MacOS/Doc-Converter"
        
        # Create zip of the .app bundle
        zip -r "artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.zip" "Doc-Converter-Silicon.app"
        
        # Verify archive creation
        echo "Compressed archive details:"
        ls -la "artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.zip"
        
        # Show zip contents
        unzip -l "artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.zip"

    - name: Upload macOS Silicon Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.zip
        asset_name: Doc-Converter-Silicon-${{ steps.tag.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload Oracle Linux 8 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ol8/Doc-Converter
        asset_name: Doc-Converter-OL8-${{ steps.tag.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Oracle Linux 9 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ol9/Doc-Converter
        asset_name: Doc-Converter-OL9-${{ steps.tag.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-24-04-${{ steps.tag.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 22.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ubuntu-22-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-22-04-${{ steps.tag.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 20.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-20-04-${{ steps.tag.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream
