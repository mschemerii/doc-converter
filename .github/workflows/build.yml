name: Build and Release Doc Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            python-version: '3.10'
            arch: x86_64
          - os: macos-14
            python-version: '3.10'
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Upgrade Git
      run: |
        brew update
        brew upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.arch }}
        cache: 'pip'
        check-latest: true

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies with specific versions
        python3 -m pip install \
          'pyinstaller==6.11.1' \
          'pyobjc-framework-Cocoa==10.2' \
          'python-docx==1.0.1' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Install Tkinter for macOS
        brew install python-tk@3.10
        python3 -m pip install tk

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.arch }}"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
        
        # Debug: Print build directory
        echo "Build directory: $BUILD_DIR"
        ls -la build/

    - name: Build macOS Executable
      env:
        MACOS_ARCH: ${{ matrix.arch }}
        OS_VERSION: ${{ matrix.os }}
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/${OS_VERSION}-${MACOS_ARCH}"
        mkdir -p "$BUILD_DIR"
        
        # Verify build directory
        echo "Build directory: $BUILD_DIR"
        if [ ! -d "$BUILD_DIR" ]; then
          echo "Error: Build directory could not be created"
          exit 1
        fi

        # Determine architecture-specific build parameters
        if [ "$MACOS_ARCH" == "arm64" ]; then
          ARCH_FLAGS="arch -arm64"
          MIN_OS_VERSION="11.0"
        else
          ARCH_FLAGS=""
          MIN_OS_VERSION="10.15"
        fi

        # Change to build directory
        cd "$BUILD_DIR" || exit 1
        
        $ARCH_FLAGS python -m PyInstaller \
          --name "Doc-Converter" \
          --windowed \
          --target-arch $MACOS_ARCH \
          --add-data "../../assets:assets" \
          --min-macos-version $MIN_OS_VERSION \
          ../../doc_converter_gui.py

        # Create proper app bundle structure
        mkdir -p "Doc-Converter.app/Contents/MacOS"
        mkdir -p "Doc-Converter.app/Contents/Resources"
        mkdir -p "Doc-Converter.app/Contents/Frameworks"

        # Find and move executable
        EXECUTABLE=$(find dist -type f | xargs file | grep "Mach-O.*executable" | cut -d: -f1)
        if [ -z "$EXECUTABLE" ]; then
          echo "Error: No executable found"
          find dist -type f | xargs file
          exit 1
        fi
        
        cp "$EXECUTABLE" "Doc-Converter.app/Contents/MacOS/Doc-Converter"
        chmod +x "Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        # Copy supporting libraries
        find dist -type f \( -name "*.so" -o -name "*.dylib" \) -exec cp {} "Doc-Converter.app/Contents/Frameworks/" \;
        
        # Create Info.plist
        cat > "Doc-Converter.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app</string>
            <key>CFBundleName</key>
            <string>Doc-Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>$MIN_OS_VERSION</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
        </dict>
        </plist>
        EOF

        # Code signing with ad-hoc identity
        codesign --force --deep --sign - \
          --options runtime \
          --timestamp=none \
          "Doc-Converter.app"

        # Create distributable zip
        ditto -c -k --keepParent "Doc-Converter.app" "Doc-Converter-${OS_VERSION}-${MACOS_ARCH}.app.zip"

        # Verify zip file exists
        if [ ! -f "Doc-Converter-${OS_VERSION}-${MACOS_ARCH}.app.zip" ]; then
          echo "Error: Zip file was not created"
          exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-${{ matrix.os }}-${{ matrix.arch }}
        path: build/${{ matrix.os }}-${{ matrix.arch }}/Doc-Converter-${{ matrix.os }}-${{ matrix.arch }}.app.zip
        retention-days: 7

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: '3.10'
            architecture: x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Upgrade Git
      run: |
        choco upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}
        cache: 'pip'
        check-latest: true

    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install \
          'pyinstaller==6.11.1' \
          'python-docx==1.0.1' \
          'pywin32==306' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Tkinter is typically included with Python on Windows
        python -m pip install tk

    - name: Install project dependencies
      run: |
        python -m pip install -r requirements.txt --no-deps
        python -m pip list

    - name: Prepare Build Environment
      run: |
        $BUILD_DIR = "build\windows-${{ matrix.architecture }}"
        New-Item -Path $BUILD_DIR -ItemType Directory -Force
        echo "BUILD_DIR=$BUILD_DIR" >> $env:GITHUB_ENV

    - name: Build Windows Executable
      run: |
        $BUILD_DIR = "build\windows-${{ matrix.architecture }}"
        Set-Location $BUILD_DIR

        pyinstaller --name "Doc-Converter" `
          --windowed `
          --add-data "..\..\assets;assets" `
          --target-arch ${{ matrix.architecture }} `
          ..\..\doc_converter_gui.py

        # Verify executable exists
        if (-not (Test-Path -Path "dist\Doc-Converter.exe")) {
          Write-Error "Executable not found"
          exit 1
        }

        # Create zip of the executable
        Compress-Archive -Path "dist\Doc-Converter.exe" -DestinationPath "Doc-Converter-Windows-${{ matrix.architecture }}.zip"

        # Verify zip exists
        if (-not (Test-Path -Path "Doc-Converter-Windows-${{ matrix.architecture }}.zip")) {
          Write-Error "Zip file not created"
          exit 1
        }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows-${{ matrix.architecture }}
        path: build\windows-${{ matrix.architecture }}\Doc-Converter-Windows-${{ matrix.architecture }}.zip
        retention-days: 7

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.{app.zip,zip}
        tag_name: v1.0.${{ github.run_number }}
        generate_release_notes: true
