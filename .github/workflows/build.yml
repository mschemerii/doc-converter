        python3 -m pip install pyinstaller
        
        # Build executable
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        
        # Prepare package structure
        mkdir -p package/usr/local/bin
        cp dist/Doc-Converter package/usr/local/bin/doc-converter
        
        # Create DEB package
        fpm -s dir -t deb \
            -n doc-converter \
            -v 1.0 \
            -p artifacts/doc_converter-ubuntu-24-04/Doc-Converter-Ubuntu-24.04.deb \
            --deb-no-default-config-files \
            --depends python3 \
            -C package \
            usr/local/bin/doc-converter
    
    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-24-04
        path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter-Ubuntu-24.04.deb

  upload-artifacts:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
      - build-oracle-linux-8
      - build-oracle-linux-9
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.generate_tag.outputs.tag_name }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate unique tag
      id: generate_tag
      run: |
        # Use the pushed tag if it exists, otherwise use a timestamp
        TAG=${GITHUB_REF#refs/tags/}
        if [[ "$TAG" == "refs/heads"* ]]; then
          TAG=$(date +'v%Y.%m.%d-%H%M%S')
        fi
        echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
    
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows

    - name: Download macOS Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-macos-intel
        path: artifacts/doc_converter-macos-intel

    - name: Download macOS Silicon Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon

    - name: Download Oracle Linux 8 Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-oracle-linux-8
        path: artifacts/doc_converter-oracle-linux-8

    - name: Rename Oracle Linux 8 Artifact
      run: |
        mv artifacts/doc_converter-oracle-linux-8/Doc-Converter artifacts/doc_converter-oracle-linux-8/Doc-Converter-Oracle-Linux-8-${{ steps.generate_tag.outputs.tag_name }}.rpm

    - name: Download Oracle Linux 9 Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-oracle-linux-9
        path: artifacts/doc_converter-oracle-linux-9

    - name: Rename Oracle Linux 9 Artifact
      run: |
        mv artifacts/doc_converter-oracle-linux-9/Doc-Converter artifacts/doc_converter-oracle-linux-9/Doc-Converter-Oracle-Linux-9-${{ steps.generate_tag.outputs.tag_name }}.rpm

    - name: Download Ubuntu 24.04 Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-ubuntu-24-04
        path: artifacts/doc_converter-ubuntu-24-04

    - name: Rename Ubuntu 24.04 Artifact
      run: |
        mv artifacts/doc_converter-ubuntu-24-04/Doc-Converter artifacts/doc_converter-ubuntu-24-04/Doc-Converter-Ubuntu-24.04-${{ steps.generate_tag.outputs.tag_name }}.deb

    - name: Download Ubuntu 22.04 Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-ubuntu-22-04
        path: artifacts/doc_converter-ubuntu-22-04

    - name: Rename Ubuntu 22.04 Artifact
      run: |
        mv artifacts/doc_converter-ubuntu-22-04/Doc-Converter artifacts/doc_converter-ubuntu-22-04/Doc-Converter-Ubuntu-22.04-${{ steps.generate_tag.outputs.tag_name }}.deb

    - name: Download Ubuntu 20.04 Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: artifacts/doc_converter-ubuntu-20-04

    - name: Rename Ubuntu 20.04 Artifact
      run: |
        mv artifacts/doc_converter-ubuntu-20-04/Doc-Converter artifacts/doc_converter-ubuntu-20-04/Doc-Converter-Ubuntu-20.04-${{ steps.generate_tag.outputs.tag_name }}.deb

    - name: List Downloaded Artifacts
      run: |
        echo "Listing downloaded artifacts:"
        find artifacts -type f

  create-release:
    needs: 
      - upload-artifacts
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.upload-artifacts.outputs.tag_name }}
        release_name: Release ${{ needs.upload-artifacts.outputs.tag_name }}
        draft: false
        prerelease: false

    - name: Upload Windows Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
        asset_name: Doc-Converter-Windows-${{ needs.upload-artifacts.outputs.tag_name }}.exe
        asset_content_type: application/octet-stream

    - name: Upload macOS Intel Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
        asset_name: Doc-Converter-Intel-${{ needs.upload-artifacts.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload macOS Silicon Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
        asset_name: Doc-Converter-Silicon-${{ needs.upload-artifacts.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload Oracle Linux 8 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-oracle-linux-8/Doc-Converter-Oracle-Linux-8-${{ needs.upload-artifacts.outputs.tag_name }}.rpm
        asset_name: Doc-Converter-Oracle-Linux-8-${{ needs.upload-artifacts.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Oracle Linux 9 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-oracle-linux-9/Doc-Converter-Oracle-Linux-9-${{ needs.upload-artifacts.outputs.tag_name }}.rpm
        asset_name: Doc-Converter-Oracle-Linux-9-${{ needs.upload-artifacts.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter-Ubuntu-24.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_name: Doc-Converter-Ubuntu-24.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 22.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-22-04/Doc-Converter-Ubuntu-22.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_name: Doc-Converter-Ubuntu-22.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 20.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter-Ubuntu-20.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_name: Doc-Converter-Ubuntu-20.04-${{ needs.upload-artifacts.outputs.tag_name }}.deb
        asset_content_type: application/octet-stream
