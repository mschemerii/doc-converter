name: Build and Release Document Converter

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile --windowed doc_converter_gui.py
        mkdir -p artifacts/doc_converter-windows
        cp dist/Doc-Converter.exe artifacts/doc_converter-windows/Doc-Converter.exe
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows/Doc-Converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build macOS Intel Executable
      run: |
        # Create temporary build directory
        mkdir -p build/intel
        cd build/intel
        
        # Capture full PyInstaller output
        python -m PyInstaller \
          --name "Doc-Converter" \
          --windowed \
          --target-arch x86_64 \
          --log-level=DEBUG \
          --clean \
          --noconfirm \
          ../../doc_converter_gui.py \
          2>&1 | tee pyinstaller_build.log

        # Check if PyInstaller build log contains errors
        if grep -q "ERROR" pyinstaller_build.log; then
          echo "PyInstaller build encountered errors:"
          cat pyinstaller_build.log
          exit 1
        fi

        # Explicitly check for .app bundle and executable
        if [ ! -d "dist/Doc-Converter.app" ]; then
          echo "Error: Doc-Converter.app not found in dist directory"
          echo "Contents of dist directory:"
          find dist -type d
          echo "PyInstaller build log:"
          cat pyinstaller_build.log
          exit 1
        fi

        # Verify executable architecture
        echo "Executable details:"
        file "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        otool -l "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter" | grep -E "cputype|cpusubtype"

        # Ensure the executable is x86_64
        if ! otool -l "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter" | grep -q "cputype 7"; then
          echo "Error: Executable is not x86_64"
          exit 1
        fi

        # List all dependencies
        echo "Dependency list:"
        otool -L "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"

        # Sign the executable first
        codesign --force --deep --sign - \
          --options runtime \
          --entitlements /dev/null \
          "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        # Sign any dylibs and frameworks
        find "dist/Doc-Converter.app" -type f \( -name "*.dylib" -o -name "*.so" \) | while read lib; do
          codesign --force --sign - "$lib"
        done

        # Finally sign the entire app bundle
        codesign --force --deep --sign - \
          --options runtime \
          --timestamp=none \
          "dist/Doc-Converter.app"

        # Verify signing of executable and bundle
        echo "Verifying executable signing..."
        codesign -vv "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        echo "Verifying bundle signing..."
        codesign -vv --deep "dist/Doc-Converter.app"

        # Create zip of the app bundle
        ditto -c -k --keepParent "dist/Doc-Converter.app" "Doc-Converter-Intel.app.zip"
        
        # Move back to root directory
        cd ../..
        
        # Create artifacts directory and copy zip
        mkdir -p artifacts/doc_converter-macos-intel
        cp build/intel/Doc-Converter-Intel.app.zip artifacts/doc_converter-macos-intel/

    - name: Upload macOS Intel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-intel
        path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip

  build-macos-silicon:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build macOS Silicon Executable
      run: |
        # Create temporary build directory
        mkdir -p build/silicon
        cd build/silicon
        
        # Build the executable with arm64 architecture
        arch -arm64 python -m PyInstaller \
          --name "Doc-Converter" \
          --windowed \
          --target-arch arm64 \
          --log-level=DEBUG \
          --clean \
          --noconfirm \
          ../../doc_converter_gui.py
        
        # Verify the .app bundle exists
        if [ ! -d "dist/Doc-Converter.app" ]; then
          echo "Error: Doc-Converter.app not found in dist directory"
          echo "Contents of dist directory:"
          find dist -type d
          exit 1
        fi
        
        # Verify executable
        echo "Executable details:"
        file "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        otool -l "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter" | grep -E "cputype|cpusubtype"
        
        # Debugging: List all files in the app bundle
        echo "App bundle contents:"
        find "dist/Doc-Converter.app" -type f
        
        # Attempt to sign with verbose output and error handling
        echo "Signing individual libraries..."
        find "dist/Doc-Converter.app" -type f \( -name "*.dylib" -o -name "*.so" \) | while read lib; do
          echo "Signing library: $lib"
          codesign --force --sign - --verbose "$lib" || {
            echo "Warning: Could not sign library $lib"
            # Continue with the build instead of failing
          }
        done
        
        # Sign the executable
        echo "Signing executable..."
        codesign --force --deep --sign - \
          --options runtime \
          --entitlements /dev/null \
          --verbose \
          "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        # Sign the entire app bundle
        echo "Signing app bundle..."
        codesign --force --deep --sign - \
          --options runtime \
          --timestamp=none \
          --verbose \
          "dist/Doc-Converter.app"
        
        # Verify signing of executable and bundle
        echo "Verifying executable signing..."
        codesign -vv "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        echo "Verifying bundle signing..."
        codesign -vv --deep "dist/Doc-Converter.app"
        
        # Create zip of the app bundle
        ditto -c -k --keepParent "dist/Doc-Converter.app" "Doc-Converter-Silicon.app.zip"
        
        # Move back to root directory
        cd ../..
        
        # Create artifacts directory and copy zip
        mkdir -p artifacts/doc_converter-macos-silicon
        cp build/silicon/Doc-Converter-Silicon.app.zip artifacts/doc_converter-macos-silicon/
      
      # Continue even if signing fails
      continue-on-error: true

    - name: Upload macOS Silicon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip

  create-release:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-windows
          path: artifacts/doc_converter-windows

      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-macos-intel
          path: artifacts/doc_converter-macos-intel

      - name: Download macOS Silicon Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-macos-silicon
          path: artifacts/doc_converter-macos-silicon

      - name: List artifacts
        run: find artifacts -type f

      - name: Extract tag or branch name
        id: get_ref
        run: |
          # Remove refs/heads/ or refs/tags/ prefix
          REF_NAME="${GITHUB_REF#refs/heads/}"
          REF_NAME="${REF_NAME#refs/tags/}"
          
          # If on main branch, use a timestamp-based tag
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            REF_NAME="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          
          echo "tag_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "Release tag will be: $REF_NAME"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_ref.outputs.tag_name }}
          release_name: Release ${{ steps.get_ref.outputs.tag_name }}
          draft: false
          prerelease: false

      - name: Upload Windows Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
          asset_name: Doc-Converter-Windows.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
          asset_name: Doc-Converter-macOS-Intel.app.zip
          asset_content_type: application/zip

      - name: Upload macOS Silicon Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
          asset_name: Doc-Converter-macOS-Silicon.app.zip
          asset_content_type: application/zip
