    - name: Upload macOS Silicon Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
        asset_name: Doc-Converter-Silicon-${{ needs.create-release.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

  build-oracle-linux-8:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:8
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y python3 python3-pip gcc make

    - name: List Python version
      run: |
        python3 --version
        pip3 --version

    - name: Install project dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build executable
      run: |
        python3 -m PyInstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ol8
        cp dist/Doc-Converter artifacts/doc_converter-ol8/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol8
        path: artifacts/doc_converter-ol8/Doc-Converter

