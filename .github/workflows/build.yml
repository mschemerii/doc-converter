name: Build and Release Document Converter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      shell: pwsh
      run: |
        # Get current Python version
        $pythonVersions = python -c "import sys; print(sys.version)"
        Write-Host "Current Python version: $pythonVersions"
        
        # List Python installations
        $env:Path -split ';' | Where-Object { $_ -like '*Python*' } | ForEach-Object {
          $pythonPath = $_
          Write-Host "Checking Python installations in $pythonPath"
          Get-ChildItem "$pythonPath\python*.exe" | ForEach-Object { 
            & $_.FullName --version
          }
        }
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name doc_converter --windowed --onefile doc_converter_gui.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: dist/doc_converter.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name doc_converter --windowed --onefile doc_converter_gui.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos
        path: dist/doc_converter

  build-oracle-linux-8:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:8
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y which findutils gcc openssl-devel bzip2-devel libffi-devel wget tar xz make

    - name: List pre-installed Python versions
      run: |
        echo "System Python versions:"
        find /usr/bin -name 'python*'
        
        echo "Checking Python versions:"
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version || true
          fi
        done
        
        echo "Python executable paths:"
        which python python3 || true
    
    - name: Install Python 3.12
      run: |
        # Enable Python 3.12 module
        dnf module reset python3 -y
        dnf module enable python3:3.12 -y
        
        # Install Python 3.12 and pip
        dnf install -y python3.12 python3.12-pip
        
        # Verify installation
        python3.12 --version

    - name: Install pip and project dependencies
      run: |
        # Upgrade pip
        python3.12 -m pip install --upgrade pip
        
        # Install project dependencies
        python3.12 -m pip install -r requirements.txt
        python3.12 -m pip install pyinstaller
    
    - name: Build executable
      run: |
        python3.12 -m PyInstaller --name doc_converter --windowed --onefile doc_converter_gui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol8
        path: dist/doc_converter

