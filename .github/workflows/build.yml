  build-ubuntu-20-04:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name doc_converter --windowed --onefile doc_converter_gui.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: dist/doc_converter

  create-release:
    needs: 
      - build-windows
      - build-macos
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
      - build-oracle-linux-8
      - build-oracle-linux-9
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Generate release tag
      id: tag
      run: |
        echo "tag_name=v$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        release_name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload Windows Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-windows/doc_converter.exe
        asset_name: doc_converter-windows.exe
        asset_content_type: application/octet-stream

    - name: Upload macOS Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos/doc_converter
        asset_name: doc_converter.app
        asset_content_type: application/octet-stream

    - name: Upload Oracle Linux 8 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ol8/doc_converter
        asset_name: doc_converter-ol8.rpm
        asset_content_type: application/octet-stream

    - name: Upload Oracle Linux 9 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ol9/doc_converter
        asset_name: doc_converter-ol9.rpm
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-24-04/doc_converter
        asset_name: doc_converter-ubuntu-24-04.deb
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 22.04 Artifact
      uses: actions/upload-release-asset@v1
