        path: artifacts/doc_converter-oracle-linux-9/Doc-Converter-Oracle-Linux-9.rpm

  build-ubuntu-20-04:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby-dev build-essential
        sudo gem install fpm

    - name: Install dependencies
      run: |
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build Ubuntu DEB Package
      run: |
        mkdir -p artifacts/doc_converter-ubuntu-20-04
        # Install Python dependencies
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
        
        # Build executable
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        
        # Prepare package structure
        mkdir -p package/usr/local/bin
        cp dist/Doc-Converter package/usr/local/bin/doc-converter
        
        # Create DEB package
        fpm -s dir -t deb \
            -n doc-converter \
            -v 1.0 \
            -p artifacts/doc_converter-ubuntu-20-04/Doc-Converter-Ubuntu-20.04.deb \
            --deb-no-default-config-files \
            --depends python3 \
            -C package \
            usr/local/bin/doc-converter
    
    - name: Upload Ubuntu 20.04 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter-Ubuntu-20.04.deb

