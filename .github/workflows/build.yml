name: Build and Release Doc Converter

on:
  push:
    branches: [ main ]

# Add permissions for creating releases
permissions:
  contents: write
  packages: write
  pull-requests: read
  actions: read

jobs:
  build-macos-intel:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller python-docx lxml

    - name: Build macOS Intel Executable
      env:
        MACOS_ARCH: x86_64
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-intel-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Build command with additional flags for macOS
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Intel" \
          --distpath "$BUILD_DIR" \
          --add-binary "/System/Library/Frameworks/Tk.framework/Tk:Tk" \
          --add-binary "/System/Library/Frameworks/Tcl.framework/Tcl:Tcl" \
          --osx-bundle-identifier "com.mschemer.docconverter" \
          doc_converter_gui.py

    - name: Prepare macOS Intel Artifact
      run: |
        # Navigate to build directory
        cd build/macos-intel-py3.10
        
        # Verify .app bundle structure
        if [ ! -d "Doc-Converter-Intel.app" ]; then
          echo "Error: .app bundle not found"
          exit 1
        fi
        
        # Check for executable
        if [ ! -x "Doc-Converter-Intel.app/Contents/MacOS/Doc-Converter-Intel" ]; then
          echo "Error: Executable not found or not executable"
          exit 1
        fi
        
        # Create Info.plist with additional metadata
        PLIST="Doc-Converter-Intel.app/Contents/Info.plist"
        /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.mschemer.docconverter" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleName string 'Doc Converter'" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Doc Converter'" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string 1.0.0" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.0" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :NSHumanReadableCopyright string ' 2024 M. Schemer'" "$PLIST"
        
        # Repair .app bundle permissions
        chmod -R 755 "Doc-Converter-Intel.app"
        
        # Create ad-hoc signing certificate
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        
        # Ad-hoc sign the application with deep signing and entitlements
        codesign --force --deep \
          --sign - \
          --options runtime \
          --entitlements /dev/null \
          "Doc-Converter-Intel.app"
        
        # Verify code signing
        codesign --verify --verbose --strict "Doc-Converter-Intel.app"
        
        # Create a tar.gz of the entire .app bundle with full path preservation
        tar -czvf "../Doc-Converter-Intel.tar.gz" "Doc-Converter-Intel.app"
        
        # Verify tar contents
        tar -tzvf "../Doc-Converter-Intel.tar.gz"
        
        # Additional diagnostics
        ls -la "Doc-Converter-Intel.app/Contents/MacOS"
        otool -L "Doc-Converter-Intel.app/Contents/MacOS/Doc-Converter-Intel"

    - name: Upload macOS Intel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-intel
        path: build/Doc-Converter-Intel.tar.gz
        retention-days: 7

  build-macos-silicon:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller python-docx lxml

    - name: Build macOS Silicon Executable
      env:
        MACOS_ARCH: arm64
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-silicon-py3.10"
        mkdir -p "$BUILD_DIR"
        
        # Build command with additional flags for macOS
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Silicon" \
          --distpath "$BUILD_DIR" \
          --add-binary "/System/Library/Frameworks/Tk.framework/Tk:Tk" \
          --add-binary "/System/Library/Frameworks/Tcl.framework/Tcl:Tcl" \
          --osx-bundle-identifier "com.mschemer.docconverter" \
          doc_converter_gui.py

    - name: Prepare macOS Silicon Artifact
      run: |
        # Navigate to build directory
        cd build/macos-silicon-py3.10
        
        # Verify .app bundle structure
        if [ ! -d "Doc-Converter-Silicon.app" ]; then
          echo "Error: .app bundle not found"
          exit 1
        fi
        
        # Check for executable
        if [ ! -x "Doc-Converter-Silicon.app/Contents/MacOS/Doc-Converter-Silicon" ]; then
          echo "Error: Executable not found or not executable"
          exit 1
        fi
        
        # Create Info.plist with additional metadata
        PLIST="Doc-Converter-Silicon.app/Contents/Info.plist"
        /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.mschemer.docconverter" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleName string 'Doc Converter'" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Doc Converter'" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string 1.0.0" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.0" "$PLIST"
        /usr/libexec/PlistBuddy -c "Add :NSHumanReadableCopyright string ' 2024 M. Schemer'" "$PLIST"
        
        # Repair .app bundle permissions
        chmod -R 755 "Doc-Converter-Silicon.app"
        
        # Create ad-hoc signing certificate
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        
        # Ad-hoc sign the application with deep signing and entitlements
        codesign --force --deep \
          --sign - \
          --options runtime \
          --entitlements /dev/null \
          "Doc-Converter-Silicon.app"
        
        # Verify code signing
        codesign --verify --verbose --strict "Doc-Converter-Silicon.app"
        
        # Create a tar.gz of the entire .app bundle with full path preservation
        tar -czvf "../Doc-Converter-Silicon.tar.gz" "Doc-Converter-Silicon.app"
        
        # Verify tar contents
        tar -tzvf "../Doc-Converter-Silicon.tar.gz"
        
        # Additional diagnostics
        ls -la "Doc-Converter-Silicon.app/Contents/MacOS"
        otool -L "Doc-Converter-Silicon.app/Contents/MacOS/Doc-Converter-Silicon"

    - name: Upload macOS Silicon Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-silicon
        path: build/Doc-Converter-Silicon.tar.gz
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - architecture: x64

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.architecture }}
        cache: 'pip'

    - name: Install system dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install `
          pyinstaller==6.11.1 `
          pywin32==306 `
          python-docx==1.0.1 `
          lxml==4.9.3

    - name: Install project dependencies
      run: |
        python -m pip install -r requirements.txt --no-deps
        python -m pip list

    - name: Prepare Build Environment
      run: |
        mkdir build\windows-${{ matrix.architecture }}

    - name: Build Windows Executable
      shell: pwsh
      run: |
        # Remove existing build directory if it exists
        if (Test-Path "build\windows-${{ matrix.architecture }}") {
          Remove-Item -Path "build\windows-${{ matrix.architecture }}" -Recurse -Force
        }
        
        # Create clean build directory
        New-Item -Path "build\windows-${{ matrix.architecture }}" -ItemType Directory -Force

        # Build executable
        pyinstaller --clean --noconfirm --windowed `
          --name "Doc-Converter-Windows-${{ matrix.architecture }}" `
          --distpath "build\windows-${{ matrix.architecture }}" `
          doc_converter_gui.py

    - name: Prepare Windows Artifact
      shell: pwsh
      run: |
        # Navigate to build directory
        Set-Location "build\windows-${{ matrix.architecture }}"
        
        # Find the executable
        $exeFiles = Get-ChildItem -Path . -Recurse -Include "*.exe"
        
        if ($exeFiles.Count -eq 0) {
          Write-Error "No executable found in build directory"
          exit 1
        }
        
        # Compress the executable
        Compress-Archive -Path $exeFiles[0].FullName -DestinationPath "..\Doc-Converter-Windows-${{ matrix.architecture }}.zip"
        
        # List contents of zip for verification
        Expand-Archive -Path "..\Doc-Converter-Windows-${{ matrix.architecture }}.zip" -DestinationPath ".\extracted" -Force
        Get-ChildItem -Path ".\extracted"

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows-${{ matrix.architecture }}
        path: build\Doc-Converter-Windows-${{ matrix.architecture }}.zip
        retention-days: 7
        if-no-files-found: error

  release:
    needs: [build-macos-intel, build-macos-silicon, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List Artifacts
      run: |
        echo "Listing downloaded artifacts:"
        ls -la artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          artifacts/Doc-Converter-Intel.tar.gz
          artifacts/Doc-Converter-Silicon.tar.gz
          artifacts/Doc-Converter-Windows-x64.zip
        generate_release_notes: true
        tag_name: v${{ github.sha }}
