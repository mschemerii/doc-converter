name: Build and Release Document Converter

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile --windowed doc_converter_gui.py
        mkdir -p artifacts/doc_converter-windows
        cp dist/Doc-Converter.exe artifacts/doc_converter-windows/Doc-Converter.exe
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows/Doc-Converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS Intel Executable
      run: |
        # Create app bundle directory structure
        mkdir -p "Doc-Converter.app/Contents/MacOS"
        mkdir -p "Doc-Converter.app/Contents/Resources"
        
        # Build the executable
        pyinstaller --name "Doc-Converter" --windowed doc_converter_gui.py
        
        # Copy the built executable to the app bundle
        cp dist/Doc-Converter "Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        # Create Info.plist
        cat > "Doc-Converter.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app</string>
            <key>CFBundleName</key>
            <string>Doc-Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Create zip of the app bundle
        zip -r Doc-Converter-Intel.app.zip Doc-Converter.app
        
        # Create artifacts directory
        mkdir -p artifacts/doc_converter-macos-intel
        
        # Copy zip to artifacts
        cp Doc-Converter-Intel.app.zip artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
    
    - name: Upload macOS Intel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-intel
        path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip

  build-macos-silicon:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build macOS Silicon App
      run: |
        # Create app bundle
        APP_NAME="Doc-Converter-Silicon.app"
        mkdir -p "$APP_NAME/Contents/MacOS"
        mkdir -p "$APP_NAME/Contents/Resources"
        
        # Create Info.plist
        cat > "$APP_NAME/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app.silicon</string>
            <key>CFBundleName</key>
            <string>Doc Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
        </dict>
        </plist>
        EOF
        
        # Build executable for arm64 architecture
        arch -arm64 python3 -m PyInstaller \
            --name "Doc-Converter" \
            --onefile \
            --windowed \
            --target-architecture arm64 \
            doc_converter_gui.py
        
        # Move executable to app bundle
        cp dist/Doc-Converter "$APP_NAME/Contents/MacOS/"
        
        # Create artifacts directory
        mkdir -p artifacts/doc_converter-macos-silicon
        
        # Create zip with preserving permissions
        ditto -c -k --keepParent "$APP_NAME" "artifacts/doc_converter-macos-silicon/$APP_NAME.zip"
    
    - name: Upload macOS Silicon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip

  create-release:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-windows
          path: artifacts/doc_converter-windows

      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-macos-intel
          path: artifacts/doc_converter-macos-intel

      - name: Download macOS Silicon Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc_converter-macos-silicon
          path: artifacts/doc_converter-macos-silicon

      - name: List artifacts
        run: find artifacts -type f

      - name: Extract tag or branch name
        id: get_ref
        run: |
          # Remove refs/heads/ or refs/tags/ prefix
          REF_NAME="${GITHUB_REF#refs/heads/}"
          REF_NAME="${REF_NAME#refs/tags/}"
          
          # If on main branch, use a timestamp-based tag
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            REF_NAME="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          
          echo "tag_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "Release tag will be: $REF_NAME"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_ref.outputs.tag_name }}
          release_name: Release ${{ steps.get_ref.outputs.tag_name }}
          draft: false
          prerelease: false

      - name: Upload Windows Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
          asset_name: Doc-Converter-Windows.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
          asset_name: Doc-Converter-macOS-Intel.app.zip
          asset_content_type: application/zip

      - name: Upload macOS Silicon Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
          asset_name: Doc-Converter-macOS-Silicon.app.zip
          asset_content_type: application/zip
