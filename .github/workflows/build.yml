name: Build and Release Document Converter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      shell: pwsh
      run: |
        # Get current Python version
        $pythonVersions = python -c "import sys; print(sys.version)"
        Write-Host "Current Python version: $pythonVersions"
        
        # List Python installations
        $env:Path -split ';' | Where-Object { $_ -like '*Python*' } | ForEach-Object {
          $pythonPath = $_
          Write-Host "Checking Python installations in $pythonPath"
          Get-ChildItem "$pythonPath\python*.exe" | ForEach-Object { 
            & $_.FullName --version
          }
        }
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --windowed --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-windows
        cp dist/Doc-Converter.exe artifacts/doc_converter-windows/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows/Doc-Converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Get tag
      id: tag
      run: |
        # Get the latest tag or use a default
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
        echo "tag_name=$TAG" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        release_name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false
    
    - name: Build macOS Intel
      run: |
        pyinstaller --clean --onefile --target-architecture x86_64 --name Doc-Converter doc_converter_gui.py
        
        # Create .app bundle structure
        mkdir -p "dist/Doc-Converter.app/Contents/MacOS"
        mv "dist/Doc-Converter" "dist/Doc-Converter.app/Contents/MacOS/Doc-Converter"
        
        mkdir -p artifacts/doc_converter-macos-intel
        cp -R "dist/Doc-Converter.app" "artifacts/doc_converter-macos-intel/Doc-Converter.app"
    
    - name: Prepare macOS Intel Artifact for Upload
      run: |
        set -x  # Enable verbose debugging output
        
        # Define artifact directory
        MACOS_INTEL_ARTIFACT_DIR="artifacts/doc_converter-macos-intel"
        
        # Verify artifact directory exists
        if [ ! -d "$MACOS_INTEL_ARTIFACT_DIR" ]; then
          echo "ERROR: Artifact directory $MACOS_INTEL_ARTIFACT_DIR does not exist"
          echo "Contents of artifacts directory:"
          ls -la artifacts/
          exit 1
        fi
        
        # Find the executable
        EXECUTABLE=$(find "$MACOS_INTEL_ARTIFACT_DIR" -type f \( -name "Doc-Converter" -o -name "doc-converter" \) | head -n 1)
        
        if [ -z "$EXECUTABLE" ]; then
          echo "ERROR: No executable found in $MACOS_INTEL_ARTIFACT_DIR"
          echo "Attempting broader search:"
          find . -type f \( -name "Doc-Converter" -o -name "doc-converter" \)
          exit 1
        fi
        
        echo "Found executable: $EXECUTABLE"
        
        # Create clean .app bundle structure
        APP_NAME="Doc-Converter-Intel.app"
        rm -rf "$APP_NAME"
        mkdir -p "$APP_NAME/Contents/MacOS"
        mkdir -p "$APP_NAME/Contents/Resources"
        
        # Copy executable and set permissions
        cp "$EXECUTABLE" "$APP_NAME/Contents/MacOS/Doc-Converter"
        chmod 755 "$APP_NAME/Contents/MacOS/Doc-Converter"
        
        # Create Info.plist
        echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>Doc-Converter</string><key>CFBundleIdentifier</key><string>com.docconverter.macos</string><key>CFBundleName</key><string>Doc-Converter</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string><key>LSMinimumSystemVersion</key><string>10.10</string><key>NSHighResolutionCapable</key><true/></dict></plist>' > "$APP_NAME/Contents/Info.plist"
        
        # Create PkgInfo
        echo "APPL????" > "$APP_NAME/Contents/PkgInfo"
        
        # Set bundle permissions
        find "$APP_NAME" -type d -exec chmod 755 {} \;
        find "$APP_NAME" -type f -exec chmod 644 {} \;
        chmod 755 "$APP_NAME/Contents/MacOS/Doc-Converter"
        
        # Create zip with preserving permissions
        rm -f "$MACOS_INTEL_ARTIFACT_DIR/$APP_NAME.zip"
        ditto -c -k --keepParent "$APP_NAME" "$MACOS_INTEL_ARTIFACT_DIR/$APP_NAME.zip"
        
        # Verify archive
        echo "Archive contents:"
        unzip -l "$MACOS_INTEL_ARTIFACT_DIR/$APP_NAME.zip"
        
        echo "Archive permissions:"
        ls -la "$MACOS_INTEL_ARTIFACT_DIR/$APP_NAME.zip"
    
    - name: Upload macOS Intel Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
        asset_name: Doc-Converter-Intel-${{ steps.tag.outputs.tag_name }}.app.zip
        asset_content_type: application/zip
  
