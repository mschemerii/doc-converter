name: Build and Release Doc Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos-intel:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Upgrade Git
      run: |
        brew update
        brew upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x86_64
        cache: 'pip'
        check-latest: true

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies with specific versions
        python3 -m pip install \
          'pyinstaller==6.11.1' \
          'pyobjc-framework-Cocoa==10.2' \
          'python-docx==1.0.1' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Install Tkinter for macOS
        brew install python-tk@${{ matrix.python-version }}
        python3 -m pip install tk

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/macos-intel-py${{ matrix.python-version }}"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

    - name: Build macOS Intel Executable
      env:
        MACOS_ARCH: x86_64
        PYTHON_VERSION: ${{ matrix.python-version }}
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-intel-py${PYTHON_VERSION}"
        mkdir -p "$BUILD_DIR"
        
        # Build command here (you'll need to add your specific build steps)
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Intel-Py${{ matrix.python-version }}" \
          doc_converter_gui.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-intel-py${{ matrix.python-version }}
        path: build/macos-intel-py${{ matrix.python-version }}/Doc-Converter-Intel-Py${{ matrix.python-version }}.app.zip
        retention-days: 7

  build-macos-silicon:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Upgrade Git
      run: |
        brew update
        brew upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: arm64
        cache: 'pip'
        check-latest: true

    - name: Install system dependencies
      run: |
        # Upgrade pip and setuptools to latest versions
        python3 -m pip install --upgrade pip setuptools wheel
        
        # Install build dependencies with specific versions
        python3 -m pip install \
          'pyinstaller==6.11.1' \
          'pyobjc-framework-Cocoa==10.2' \
          'python-docx==1.0.1' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Install Tkinter for macOS
        brew install python-tk@${{ matrix.python-version }}
        python3 -m pip install tk

    - name: Install project dependencies
      run: |
        # Use --no-deps to prevent potential conflicts
        python3 -m pip install -r requirements.txt --no-deps
        
        # Verify installed packages
        python3 -m pip list

    - name: Prepare Build Environment
      run: |
        # Create build directories with architecture-specific names
        BUILD_DIR="build/macos-silicon-py${{ matrix.python-version }}"
        mkdir -p "$BUILD_DIR"
        
        # Set environment variables for consistent builds
        echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> "$GITHUB_ENV"
        echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

    - name: Build macOS Silicon Executable
      env:
        MACOS_ARCH: arm64
        PYTHON_VERSION: ${{ matrix.python-version }}
      run: |
        # Explicitly set build directory
        BUILD_DIR="build/macos-silicon-py${PYTHON_VERSION}"
        mkdir -p "$BUILD_DIR"
        
        # Build command here (you'll need to add your specific build steps)
        pyinstaller --clean --noconfirm --windowed \
          --name "Doc-Converter-Silicon-Py${{ matrix.python-version }}" \
          doc_converter_gui.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-silicon-py${{ matrix.python-version }}
        path: build/macos-silicon-py${{ matrix.python-version }}/Doc-Converter-Silicon-Py${{ matrix.python-version }}.app.zip
        retention-days: 7

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: '3.10'
            architecture: x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Upgrade Git
      run: |
        choco upgrade git
        git --version

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}
        cache: 'pip'
        check-latest: true

    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install \
          'pyinstaller==6.11.1' \
          'python-docx==1.0.1' \
          'pywin32==306' \
          'lxml==4.9.3'

    - name: Install Tkinter
      run: |
        # Tkinter is typically included with Python on Windows
        python -m pip install tk

    - name: Install project dependencies
      run: |
        python -m pip install -r requirements.txt --no-deps
        python -m pip list

    - name: Prepare Build Environment
      run: |
        $BUILD_DIR = "build\windows-${{ matrix.architecture }}"
        New-Item -Path $BUILD_DIR -ItemType Directory -Force
        echo "BUILD_DIR=$BUILD_DIR" >> $env:GITHUB_ENV

    - name: Build Windows Executable
      run: |
        $BUILD_DIR = "build\windows-${{ matrix.architecture }}"
        Set-Location $BUILD_DIR

        pyinstaller --name "Doc-Converter" `
          --windowed `
          --add-data "..\..\assets;assets" `
          --target-arch ${{ matrix.architecture }} `
          ..\..\doc_converter_gui.py

        # Verify executable exists
        if (-not (Test-Path -Path "dist\Doc-Converter.exe")) {
          Write-Error "Executable not found"
          exit 1
        }

        # Create zip of the executable
        Compress-Archive -Path "dist\Doc-Converter.exe" -DestinationPath "Doc-Converter-Windows-${{ matrix.architecture }}.zip"

        # Verify zip exists
        if (-not (Test-Path -Path "Doc-Converter-Windows-${{ matrix.architecture }}.zip")) {
          Write-Error "Zip file not created"
          exit 1
        }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows-${{ matrix.architecture }}
        path: build\windows-${{ matrix.architecture }}\Doc-Converter-Windows-${{ matrix.architecture }}.zip
        retention-days: 7

  release:
    needs: [build-macos-intel, build-macos-silicon, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.{app.zip,zip}
        tag_name: v1.0.${{ github.run_number }}
        generate_release_notes: true
