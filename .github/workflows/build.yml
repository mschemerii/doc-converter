      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip

  build-oracle-linux-8:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:8
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo dnf update -y
        sudo dnf install -y python3 python3-pip rpm-build
        
        # Ensure Python 3.12 is the default
        sudo alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
        sudo alternatives --set python3 /usr/bin/python3.12

    - name: Verify Python installation
      run: |
        python3 --version
        python3 -m pip --version

    - name: Install dependencies
      run: |
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Prepare RPM Build
      run: |
        # Create RPM build structure
        mkdir -p ~/rpmbuild/{SOURCES,SPECS}
        
        # Copy source files to SOURCES
        cp doc_converter_gui.py requirements.txt ~/rpmbuild/SOURCES/
        
        # Create spec file
        cat > ~/rpmbuild/SPECS/doc-converter.spec << EOF
        Name:           doc-converter
        Version:        1.0
        Release:        1%{?dist}
        Summary:        Document Converter Application
        
        License:        MIT
        Source0:        doc_converter_gui.py
        Source1:        requirements.txt
        
        BuildRequires:  python3
        BuildRequires:  python3-pip
        BuildRequires:  python3-devel
        Requires:       python3
        
        %description
        A cross-platform document conversion tool
        
        %prep
        cp %{SOURCE0} %{_builddir}/
        cp %{SOURCE1} %{_builddir}/
        
        %build
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        
        %install
        mkdir -p %{buildroot}/usr/local/bin
        cp dist/Doc-Converter %{buildroot}/usr/local/bin/doc-converter
        
        %files
        /usr/local/bin/doc-converter
        
        %changelog
        * $(date +"%a %b %d %Y") Doc Converter Team <team@docconverter.com> - 1.0-1
        - Initial RPM release
        EOF
        
        # Build RPM
        rpmbuild -bb ~/rpmbuild/SPECS/doc-converter.spec
        
        # Create artifacts directory
        mkdir -p artifacts/doc_converter-oracle-linux-8
        
        # Copy RPM to artifacts
        cp ~/rpmbuild/RPMS/x86_64/doc-converter-1.0-1.el8.x86_64.rpm artifacts/doc_converter-oracle-linux-8/Doc-Converter-Oracle-Linux-8.rpm
    
    - name: Upload Oracle Linux 8 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-oracle-linux-8
        path: artifacts/doc_converter-oracle-linux-8/Doc-Converter-Oracle-Linux-8.rpm

