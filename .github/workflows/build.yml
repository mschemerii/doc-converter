    - name: Build executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-20-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-20-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter

  create-release:
    needs: 
      - build-windows
      - build-macos
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
      - build-oracle-linux-8
      - build-oracle-linux-9
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Generate release tag
      id: tag
      shell: bash
      run: |
        TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
        echo "::set-output name=tag_name::${TAG_NAME}"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        release_name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload Windows Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
        asset_name: Doc-Converter-Windows-${{ steps.tag.outputs.tag_name }}.exe
        asset_content_type: application/octet-stream

    - name: Prepare macOS Artifact for Upload
      run: |
        # Ensure we're in the correct directory
        cd "${{ github.workspace }}"
        
        # Debug: show current directory and artifact contents
        pwd
        echo "Listing artifacts directory:"
        ls -la artifacts/doc_converter-macos
        
        # Create a zip archive of the .app bundle
        cd artifacts/doc_converter-macos
        zip -r Doc-Converter.zip "Doc-Converter.app"
        
        # Verify archive creation
        echo "Compressed archive details:"
        ls -la Doc-Converter.zip
        
        # Confirm file exists
        if [ ! -f "Doc-Converter.zip" ]; then
          echo "Error: Artifact archive was not created"
          exit 1
        fi

    - name: Upload macOS Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: ${{ github.workspace }}/artifacts/doc_converter-macos/Doc-Converter.zip
        asset_name: Doc-Converter-${{ steps.tag.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload Oracle Linux 8 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ol8/Doc-Converter
        asset_name: Doc-Converter-OL8-${{ steps.tag.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Oracle Linux 9 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      with:
        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-ol9/Doc-Converter
        asset_name: Doc-Converter-OL9-${{ steps.tag.outputs.tag_name }}.rpm
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-release-asset@v1
