name: Build and Release Document Converter

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile --windowed doc_converter_gui.py
        mkdir -p artifacts/doc_converter-windows
        cp dist/Doc-Converter.exe artifacts/doc_converter-windows/Doc-Converter.exe
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-windows
        path: artifacts/doc_converter-windows/Doc-Converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build macOS Intel App
      run: |
        # Create app bundle
        APP_NAME="Doc-Converter-Intel.app"
        mkdir -p "$APP_NAME/Contents/MacOS"
        mkdir -p "$APP_NAME/Contents/Resources"
        
        # Create Info.plist
        cat > "$APP_NAME/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app</string>
            <key>CFBundleName</key>
            <string>Doc Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
        </dict>
        </plist>
        EOF
        
        # Build executable
        python3 -m PyInstaller --name "Doc-Converter" --onefile --windowed doc_converter_gui.py
        
        # Move executable to app bundle
        cp dist/Doc-Converter "$APP_NAME/Contents/MacOS/"
        
        # Create artifacts directory
        mkdir -p artifacts/doc_converter-macos-intel
        
        # Create zip with preserving permissions
        rm -f "artifacts/doc_converter-macos-intel/$APP_NAME.zip"
        ditto -c -k --keepParent "$APP_NAME" "artifacts/doc_converter-macos-intel/$APP_NAME.zip"
    
    - name: Upload macOS Intel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-intel
        path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip

  build-macos-silicon:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build macOS Silicon App
      run: |
        # Create app bundle
        APP_NAME="Doc-Converter-Silicon.app"
        mkdir -p "$APP_NAME/Contents/MacOS"
        mkdir -p "$APP_NAME/Contents/Resources"
        
        # Create Info.plist
        cat > "$APP_NAME/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Doc-Converter</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.docconverter.app</string>
            <key>CFBundleName</key>
            <string>Doc Converter</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
        </dict>
        </plist>
        EOF
        
        # Build executable
        arch -arm64 python3 -m PyInstaller --name "Doc-Converter" --onefile --windowed doc_converter_gui.py
        
        # Move executable to app bundle
        cp dist/Doc-Converter "$APP_NAME/Contents/MacOS/"
        
        # Create artifacts directory
        mkdir -p artifacts/doc_converter-macos-silicon
        
        # Create zip with preserving permissions
        rm -f "artifacts/doc_converter-macos-silicon/$APP_NAME.zip"
        ditto -c -k --keepParent "$APP_NAME" "artifacts/doc_converter-macos-silicon/$APP_NAME.zip"
    
    - name: Upload macOS Silicon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-macos-silicon
        path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip

  build-oracle-linux-8:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:8
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y python3 python3-pip gcc make

    - name: List Python version
      run: |
        python3 --version
        pip3 --version

    - name: Install project dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build Oracle Linux 8 Executable
      run: |
        python3 -m PyInstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ol8
        cp dist/Doc-Converter artifacts/doc_converter-ol8/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol8
        path: artifacts/doc_converter-ol8/Doc-Converter

  build-oracle-linux-9:
    runs-on: ubuntu-latest
    container: 
      image: oraclelinux:9
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        dnf update -y
        dnf install -y python3 python3-pip gcc make

    - name: List Python version
      run: |
        python3 --version
        pip3 --version

    - name: Install project dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    
    - name: Build Oracle Linux 9 Executable
      run: |
        python3 -m PyInstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ol9
        cp dist/Doc-Converter artifacts/doc_converter-ol9/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ol9
        path: artifacts/doc_converter-ol9/Doc-Converter

  build-ubuntu-24-04:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Ubuntu 24.04 Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-24-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-24-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-24-04
        path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter

  build-ubuntu-22-04:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Ubuntu 22.04 Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-22-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-22-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-22-04
        path: artifacts/doc_converter-ubuntu-22-04/Doc-Converter

  build-ubuntu-20-04:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    - name: List pre-installed Python versions
      run: |
        # List system Python versions
        echo "System Python versions:"
        ls /usr/bin/python*
        
        # Check Python versions
        for python in python python3 python3.9 python3.10 python3.11 python3.12; do
          if command -v $python &> /dev/null; then
            echo "Version of $python:"
            $python --version
          fi
        done
        
        # List all Python installations
        echo "Python executable paths:"
        which -a python python3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.x'
    - name: Verify Python version
      run: |
        python --version
        python -c "import sys; print(sys.executable)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Ubuntu 20.04 Executable
      run: |
        pyinstaller --name "Doc-Converter" --onefile doc_converter_gui.py
        mkdir -p artifacts/doc_converter-ubuntu-20-04
        cp dist/Doc-Converter artifacts/doc_converter-ubuntu-20-04/
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc_converter-ubuntu-20-04
        path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter

  upload-artifacts:
    needs: 
      - build-windows
      - build-macos-intel
      - build-macos-silicon
      - build-oracle-linux-8
      - build-oracle-linux-9
      - build-ubuntu-20-04
      - build-ubuntu-22-04
      - build-ubuntu-24-04
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.generate_tag.outputs.tag_name }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate unique tag
      id: generate_tag
      run: |
        # Use the pushed tag if it exists, otherwise use a timestamp
        TAG=${GITHUB_REF#refs/tags/}
        if [[ "$TAG" == "refs/heads"* ]]; then
          TAG=$(date +'v%Y.%m.%d-%H%M%S')
        fi
        echo "tag_name=$TAG" >> $GITHUB_OUTPUT
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

  create-release:
    needs: 
      - upload-artifacts
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.upload-artifacts.outputs.tag_name }}
        release_name: Release ${{ needs.upload-artifacts.outputs.tag_name }}
        draft: false
        prerelease: false

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload Windows Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-windows/Doc-Converter.exe
        asset_name: Doc-Converter-Windows-${{ needs.upload-artifacts.outputs.tag_name }}.exe
        asset_content_type: application/octet-stream

    - name: Upload macOS Intel Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos-intel/Doc-Converter-Intel.app.zip
        asset_name: Doc-Converter-Intel-${{ needs.upload-artifacts.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload macOS Silicon Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
        asset_name: Doc-Converter-Silicon-${{ needs.upload-artifacts.outputs.tag_name }}.app.zip
        asset_content_type: application/zip

    - name: Upload Ubuntu 24.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-24-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-24-04-${{ needs.upload-artifacts.outputs.tag_name }}
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 22.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-22-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-22-04-${{ needs.upload-artifacts.outputs.tag_name }}
        asset_content_type: application/octet-stream

    - name: Upload Ubuntu 20.04 Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: artifacts/doc_converter-ubuntu-20-04/Doc-Converter
        asset_name: Doc-Converter-Ubuntu-20-04-${{ needs.upload-artifacts.outputs.tag_name }}
        asset_content_type: application/octet-stream
