        upload_url: ${{ env.UPLOAD_URL }}
        asset_path: artifacts/doc_converter-macos-silicon/Doc-Converter-Silicon.app.zip
        asset_name: Doc-Converter-Silicon-${{ steps.tag.outputs.tag_name }}.app.zip
        asset_content_type: application/zip
  
  build-oracle-linux-8:
    runs-on: ubuntu-latest
