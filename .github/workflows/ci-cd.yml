name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Check Python Installation
      id: check_python
      run: |
        if command -v python &>/dev/null; then
          echo "python_installed=true" >> $GITHUB_ENV
          PYTHON_VERSION=$(python --version 2>&1)
          if [[ $PYTHON_VERSION == "Python 3.12"* ]]; then
            echo "python_312_installed=true" >> $GITHUB_ENV
          else
            echo "python_312_installed=false" >> $GITHUB_ENV
          fi
        else
          echo "python_installed=false" >> $GITHUB_ENV
          echo "python_312_installed=false" >> $GITHUB_ENV
      shell: bash
    - name: Set up Python
      if: env.python_installed == 'false' || env.python_312_installed == 'false'
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        check-latest: true
    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    - name: Clean and Build Windows Application
      run: |
        echo "Cleaning previous builds..."
        Remove-Item -Recurse -Force build, dist -ErrorAction SilentlyContinue
        echo "Building the application..."
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
        echo "Verifying build artifacts..."
        Get-ChildItem -Path dist
      shell: pwsh
    - name: Upload Windows Build
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-windows
        path: dist/doc-converter.exe
        if-no-files-found: warn
    - name: Verify Dist Directory
      run: |
        echo "Listing contents of dist directory:"
        Get-ChildItem -Path dist
      shell: pwsh

  release:
    needs: [build-windows]
    runs-on: windows-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-converter-windows
        path: dist
        merge-multiple: false
    - name: Verify Downloaded Dist Directory
      run: |
        echo "Listing contents of downloaded dist directory:"
        Get-ChildItem -Path dist
      shell: pwsh
    - name: Verify Downloaded Contents
      run: |
        echo "Verifying downloaded contents:"
        Get-ChildItem -Path dist -Recurse -File
      shell: pwsh
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          dist/doc-converter.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
