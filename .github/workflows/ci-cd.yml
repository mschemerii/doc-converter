name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build Windows Executable
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py --collect-all tkinter
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows
        path: dist/doc-converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        architecture: 'x64'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
        
        # Verify Python architecture
        echo "Python architecture:"
        python -c "import platform; print(platform.machine())"
      shell: bash
    
    - name: Build macOS Executable (Intel)
      run: |
        # Create spec file with proper architecture
        pyi-makespec --windowed --name doc-converter --target-arch x86_64 doc_converter_gui.py
        
        # Create a new spec file with our modifications
        cat > doc-converter.spec << 'END_OF_SPEC'
        # -*- mode: python ; coding: utf-8 -*-
        import sys
        from PyInstaller.utils.hooks import collect_all

        block_cipher = None

        a = Analysis(['doc_converter_gui.py'], pathex=[], binaries=[], datas=[], hiddenimports=[], hookspath=[], hooksconfig={}, runtime_hooks=[], excludes=[], win_no_prefer_redirects=False, win_private_assemblies=False, cipher=block_cipher, noarchive=False)

        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

        exe = EXE(pyz, a.scripts, [], exclude_binaries=True, name='doc-converter', debug=False, bootloader_ignore_signals=False, strip=False, upx=True, console=False, disable_windowed_traceback=False, argv_emulation=True, target_arch='x86_64', codesign_identity=None, entitlements_file=None)

        coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, strip=False, upx=True, upx_exclude=[], name='doc-converter')

        app = BUNDLE(coll, name='doc-converter.app', icon=None, bundle_identifier='com.docconverter.app', info_plist={'LSMinimumSystemVersion': '10.13.0', 'NSHighResolutionCapable': True, 'CFBundleShortVersionString': '1.0.0', 'CFBundleVersion': '1.0.0'})
        END_OF_SPEC
        
        # Display the spec file
        echo "Final spec file contents:"
        cat doc-converter.spec
        
        # Build using the spec file
        ARCHFLAGS="-arch x86_64" python -m PyInstaller doc-converter.spec
        
        # Verify app bundle structure
        echo "App bundle structure:"
        find dist/doc-converter.app -type f || true
        
        # Check binary dependencies
        echo "Binary dependencies:"
        file dist/doc-converter.app/Contents/MacOS/doc-converter || true
        otool -L dist/doc-converter.app/Contents/MacOS/doc-converter || true
      shell: bash
    
    - name: Install Apple Certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        # Create signing keychain
        security create-keychain -p "temp_password" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "temp_password" build.keychain
        
        # Import certificate
        echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
        security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp_password" build.keychain
        
        # Clean up
        rm certificate.p12
        
        # List certificates to verify import
        security find-identity -v
      shell: bash

    - name: Sign App Bundle
      run: |
        # List the contents of dist directory
        echo "Contents of dist directory:"
        ls -la dist/
        
        # Sign all binaries in the app bundle
        find "dist/doc-converter.app/Contents/MacOS" -type f -exec codesign --force --options runtime --sign "Developer ID Application" {} \;
        
        # Sign the frameworks if they exist
        if [ -d "dist/doc-converter.app/Contents/Frameworks" ]; then
          find "dist/doc-converter.app/Contents/Frameworks" -type f -exec codesign --force --options runtime --sign "Developer ID Application" {} \;
        fi
        
        # Finally sign the app bundle
        codesign --force --options runtime --sign "Developer ID Application" dist/doc-converter.app
        
        # Verify signing
        echo "Verifying code signature..."
        codesign -vvv --deep --strict dist/doc-converter.app
        
        # Check entitlements
        echo "Checking entitlements..."
        codesign -d --entitlements :- dist/doc-converter.app
      shell: bash
    
    - name: Package macOS App
      run: |
        cd dist
        # List contents before zipping
        echo "Contents before zipping:"
        ls -la
        
        # Create zip archive
        zip -r doc-converter-macos.zip doc-converter.app
        
        # Verify zip contents
        echo "Zip file contents:"
        unzip -l doc-converter-macos.zip
      shell: bash
    
    - name: Notarize App
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        TEAM_ID: ${{ secrets.TEAM_ID }}
      run: |
        echo "Starting notarization process..."
        
        # Verify app bundle structure
        echo "App bundle structure:";
        find dist/doc-converter.app -type f;
        
        # Verify code signing
        echo "Verifying code signing...";
        codesign -vvv --deep --strict dist/doc-converter.app;
        
        # Check entitlements
        echo "Checking entitlements...";
        codesign -d --entitlements :- dist/doc-converter.app;
        
        # Submit for notarization
        echo "Submitting for notarization...";
        xcrun notarytool submit dist/doc-converter-macos.zip \
          --apple-id "$APPLE_ID" \
          --password "$APP_SPECIFIC_PASSWORD" \
          --team-id "$TEAM_ID" \
          --wait
        
        echo "Notarization completed. Stapling ticket..."
        
        # Staple the ticket
        xcrun stapler staple "dist/doc-converter.app"
        
        # Verify stapling
        echo "Verifying stapling..."
        xcrun stapler validate "dist/doc-converter.app"
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-intel
        path: dist/doc-converter-macos.zip

  release:
    needs: [build-windows, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-converter-windows
        path: windows-build

    - name: Download macOS Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-converter-macos-intel
        path: macos-build

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          windows-build/doc-converter.exe
          macos-build/doc-converter-macos.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
