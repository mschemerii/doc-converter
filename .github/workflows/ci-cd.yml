name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Check Python Version
      id: check-python
      run: |
        if (Get-Command python -ErrorAction SilentlyContinue) {
          $python_version = python --version 2>&1
          Write-Host "Python found: $python_version"
          if ($python_version -match "Python 3\.[0-9]") {
            $major_version = [int]$python_version.Split('.')[1]
            if ($major_version -ge 9) {
              Write-Host "Using existing Python installation: $python_version"
              echo "python_version=$python_version" >> $env:GITHUB_OUTPUT
              echo "needs_install=false" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "Python version is less than 3.9, will install Python 3.12..."
              echo "needs_install=true" >> $env:GITHUB_OUTPUT
            }
          }
        } else {
          Write-Host "Python not found. Will install Python 3.12..."
          echo "needs_install=true" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh
    - name: Set up Python
      if: steps.check-python.outputs.needs_install == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.0'
    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    - name: Clean and Build Windows Application
      run: |
        # Clean previous builds
        Remove-Item -Recurse -Force build, dist -ErrorAction SilentlyContinue
        # Build the application as a self-contained binary
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
        # Debug: Verify build artifacts
        Get-ChildItem -Path dist
      shell: pwsh
    - name: Upload Windows Build
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-windows
        path: dist/doc-converter.exe
        if-no-files-found: warn

  release:
    needs: [build-windows]
    runs-on: windows-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-converter-windows
        path: windows-build
        merge-multiple: false
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          windows-build/doc-converter.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
