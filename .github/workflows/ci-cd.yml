name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version Bump Type'
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  file-tag-generator:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate tags for all files
      run: |
        # Function to create a safe tag name
        create_safe_tag() {
          local file="$1"
          # Replace non-alphanumeric characters with hyphens, convert to lowercase
          local safe_filename=$(echo "$file" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          # Truncate filename if too long
          safe_filename=${safe_filename:0:50}
          
          # Get current commit SHA
          local COMMIT_SHA="${{ github.sha }}"
          
          # Create a tag with filename and commit SHA
          echo "file-tag-${safe_filename}-${COMMIT_SHA:0:7}"
        }
        
        # Get list of all files in the repository
        echo "Finding all files..."
        ALL_FILES=$(find . -type f | sed 's|^\./||' | grep -v '^\.git/')
        
        # Configure git
        git config user.name github-actions
        git config user.email github-actions@github.com
        
        # Generate a tag for each file
        for file in $ALL_FILES; do
          # Skip git directories, binary files, and directories
          if [[ "$file" =~ ^\.git/ ]] || [[ -d "$file" ]] || [[ -x "$file" ]]; then
            echo "Skipping: $file"
            continue
          fi
          
          # Create tag for the file
          TAG=$(create_safe_tag "$file")
          echo "Creating tag: $TAG for file: $file"
          
          # Create the tag
          git tag -f "$TAG" || echo "Failed to create tag: $TAG"
          git push -f origin "$TAG" || echo "Failed to push tag: $TAG"
        done

  lint-and-test:
    needs: file-tag-generator
    if: always()
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check Python version compatibility
      run: |
        python python_version_check.py
    
    - name: Run basic import checks
      run: |
        python -m compileall .
    
    - name: Check if release should be created
      id: check_release
      run: |
        # Always create a release on push
        echo "should_release=true" >> $GITHUB_OUTPUT

  version-bump:
    if: github.event_name == 'push' || 
        (github.event_name == 'workflow_dispatch' && 
         (github.event.inputs.version_bump == 'patch' || 
          github.event.inputs.version_bump == 'minor' || 
          github.event.inputs.version_bump == 'major'))
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Bump version
      id: bump_version
      env:
        EVENT_NAME: ${{ github.event_name }}
        VERSION_BUMP: ${{ github.event.inputs.version_bump }}
      run: |
        # Get the latest semantic version tag (starts with v)
        LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1 || echo "v0.1.0")
        echo "Latest semantic version tag: $LATEST_TAG"
        
        CURRENT_VERSION=${LATEST_TAG#v}
        echo "Current version: $CURRENT_VERSION"
        
        # Split version into major, minor, patch
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        # Determine bump type based on changed files or manual input
        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          case "$VERSION_BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              CHANGELOG_SECTION="### Added"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              CHANGELOG_SECTION="### Added"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              CHANGELOG_SECTION="### Fixed"
              ;;
            *)
              PATCH=$((PATCH + 1))
              CHANGELOG_SECTION="### Changed"
              ;;
          esac
        else
          # Automatic bump for push events
          PATCH=$((PATCH + 1))
          CHANGELOG_SECTION="### Changed"
        fi
        
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "New version: $NEW_VERSION"
        CURRENT_DATE=$(date +"%Y-%m-%d")
        
        # Escape NEW_VERSION for sed to handle dots
        ESCAPED_VERSION=$(printf '%s\n' "$NEW_VERSION" | sed -e 's/[\/&]/\\&/g')
        
        # Update Inno Setup script
        sed -i "s/AppVersion=[0-9.]*/AppVersion=$ESCAPED_VERSION/" installer.iss
        sed -i "s/OutputBaseFilename=DocConverterInstaller_v[0-9.]*/OutputBaseFilename=DocConverterInstaller_v$ESCAPED_VERSION/" installer.iss
        
        # Update CHANGELOG.md
        sed -i "0,/\[Unreleased\]/s/\[Unreleased\]/[Unreleased]\n\n## [$ESCAPED_VERSION] - $CURRENT_DATE\n$CHANGELOG_SECTION\n- TODO: Add specific changes/" CHANGELOG.md
        
        # Create and push new version tag
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add installer.iss CHANGELOG.md
        git commit -m "Bump version to v$NEW_VERSION"
        git tag "v$NEW_VERSION"
        git push origin "v$NEW_VERSION"
        
        # Output the new version for subsequent jobs
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: [lint-and-test, version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
            installer: true
          - os: ubuntu-22.04  # Latest LTS version
            platform: linux
            ext: ''
            installer: false
          - os: macos-13  # Ventura (macOS 13)
            platform: macos
            ext: ''
            installer: false

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build Executable
      run: |
        pyinstaller --onefile --windowed doc_converter_gui.py
    
    - name: Create Windows Installer
      if: matrix.installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss
        options: /O+
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-${{ matrix.platform }}
        path: |
          dist/*${{ matrix.ext }}
          Output/*.exe
    
    - name: Create Unique Tag for Release
      id: create_tag
      run: |
        # Get the latest tag or set to empty
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        # Generate a timestamp-based tag if no version bump occurred
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        
        # Determine the tag to use
        if [ -n "${{ needs.version-bump.outputs.new_version }}" ]; then
          # Use version bump tag if available
          TAG="v${{ needs.version-bump.outputs.new_version }}"
        elif [ -n "$LATEST_TAG" ]; then
          # Use existing latest tag
          TAG="$LATEST_TAG-${TIMESTAMP}"
        else
          # Create a new initial tag
          TAG="v0.1.0-${TIMESTAMP}"
        fi
        
        # Create and push the tag
        git config user.name github-actions
        git config user.email github-actions@github.com
        git tag "$TAG"
        git push origin "$TAG"
        
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Created tag: ${TAG}"
    
    - name: Create Release
      if: needs.lint-and-test.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        files: |
          dist/*${{ matrix.ext }}
          Output/*.exe
        body_path: CHANGELOG.md
        generate_release_notes: true
