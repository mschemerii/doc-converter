name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Clean and Build Windows Application
        shell: pwsh
        run: |
          Write-Host "Cleaning previous builds..."
          Remove-Item -Recurse -Force build, dist -ErrorAction SilentlyContinue
          Write-Host "Building the application..."
          python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
          Write-Host "Verifying build artifacts..."
          Get-ChildItem -Path dist -Recurse

      - name: Debug Build Directory
        shell: pwsh
        run: |
          Write-Host "Listing contents of dist directory:"
          Get-ChildItem -Path dist -Recurse

      - name: Upload Windows Build
        uses: actions/upload-artifact@v3
        with:
          name: doc-converter-windows
          path: dist/doc-converter.exe
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug - List Available Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing available artifacts in the current workflow:"
          gh run view ${{ github.run_id }} --json artifacts -q '.artifacts[].name'

      - name: Debug - List Workspace Contents
        shell: pwsh
        run: |
          Write-Host "Listing contents of workspace directory:"
          Get-ChildItem -Path $GITHUB_WORKSPACE -Recurse

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: doc-converter-windows
          path: dist

      - name: Debug - List Download Directory
        shell: pwsh
        run: |
          Write-Host "Listing contents of downloaded dist directory:"
          Get-ChildItem -Path dist -Recurse

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: dist/doc-converter.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
