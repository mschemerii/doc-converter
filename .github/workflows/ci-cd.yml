name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build Windows Executable
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py --collect-all tkinter
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-windows
        path: dist/doc-converter.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build macOS Executable (Intel)
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py --target-arch x86_64
      shell: bash
    
    - name: Install Apple Certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        # Create keychain
        security create-keychain -p "temp_password" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "temp_password" build.keychain
        
        # Import certificate
        echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
        security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp_password" build.keychain
        
        # Clean up
        rm certificate.p12
      shell: bash

    - name: Sign App Bundle
      run: |
        codesign --force --options runtime --sign "Developer ID Application" dist/doc-converter.app
        # Verify signing
        codesign -vvv --deep --strict dist/doc-converter.app
      shell: bash
    
    - name: Store Notary Credentials
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      run: |
        xcrun notarytool store-credentials "your-keychain-profile" --apple-id "$APPLE_ID" --app-specific-password "$APP_SPECIFIC_PASSWORD"
      shell: bash
    
    - name: Package macOS App
      run: |
        cd dist
        zip -r doc-converter-macos.zip doc-converter.app
      shell: bash
    
    - name: Notarize App
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      run: |
        xcrun notarytool submit dist/doc-converter-macos.zip --keychain-profile "your-keychain-profile" --wait
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-macos-intel
        path: dist/doc-converter-macos.zip

