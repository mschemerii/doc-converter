name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  build-executables:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, macos-latest-silicon]
        python-version: ['3.12']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build Windows Executable
      if: matrix.os == 'windows-latest'
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Build macOS Executable (Intel)
      if: matrix.os == 'macos-latest'
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Build macOS Executable (Silicon)
      if: matrix.os == 'macos-latest-silicon'
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-${{ matrix.os }}
        path: |
          dist/*
          Output/*.exe

  release:
    needs: build-executables
    runs-on: ubuntu-latest
    steps:
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.1.0
        files: |
          dist/doc_converter_gui.exe
          dist/doc-converter
        body: |
          Release of doc-converter executables
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
