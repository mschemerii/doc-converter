  release:
    needs: [build-windows, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          doc-converter-windows/*.exe
          doc-converter-macos-intel/*.exe
        body: |
          Release of doc-converter executables
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
