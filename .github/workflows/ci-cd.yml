name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build Windows Executable
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-windows
        path: |
          dist/*
          Output/*.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build macOS Executable (Intel)
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-macos-intel
        path: |
          dist/*
          Output/*.exe

