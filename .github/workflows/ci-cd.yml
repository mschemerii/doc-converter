name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Check Python Version
      run: |
        if python --version | grep -q "Python 3\.10"; then
          echo "Using existing Python installation."
        else
          echo "Installing Python 3.12..."
          choco install python --version=3.12.0
        fi
      shell: bash
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.0'
    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller
    - name: Clean and Build Windows Application
      run: |
        # Clean previous builds
        Remove-Item -Recurse -Force build, dist
        # Build the application as a self-contained binary
        python -m PyInstaller --onefile --windowed --name doc_converter_gui doc_converter_gui.py
        # Debug: Verify build artifacts
        Write-Host "Checking build artifacts..."
        Get-ChildItem -Path dist
      shell: pwsh
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-windows
        path: dist/doc-converter.exe

  release:
    needs: [build-windows]
    runs-on: windows-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-converter-windows
        path: windows-build
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          windows-build/doc-converter.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
