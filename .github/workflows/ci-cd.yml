name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version Bump Type'
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Explicitly grant write permissions to the GitHub token

jobs:
  lint-and-test:
    if: always()
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check Python version compatibility
      run: |
        python python_version_check.py
    
    - name: Run basic import checks
      run: |
        python -m compileall .
    
    - name: Check if release should be created
      id: check_release
      run: |
        # Always create a release on push
        echo "should_release=true" >> $GITHUB_OUTPUT

  build:
    needs: lint-and-test
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller --no-cache-dir
      shell: bash
    
    - name: Build Windows Executable
      if: matrix.os == 'windows-latest'
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Build macOS Executable
      if: matrix.os == 'macos-latest'
      run: |
        python -m PyInstaller --onefile --windowed --name doc-converter doc_converter_gui.py
      shell: bash
    
    - name: Sign macOS Executable
      if: matrix.os == 'macos-latest'
      run: |
        codesign --deep --force --verify --verbose --sign "Developer ID Application: Your Name (Team ID)" dist/doc-converter
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: doc-converter-${{ matrix.os }}
        path: |
          dist/*
          Output/*.exe
