name: macOS Build Test

on:
  workflow_dispatch:  # Manual trigger only
  
jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          architecture: 'x64'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build macOS Application
        run: |
          # Clean previous builds
          rm -rf build dist
          
          # Build app using spec file
          python -m PyInstaller macos.spec
          
          # Debug output
          echo "Contents of dist directory:"
          ls -la dist/
          echo "Contents of build directory:"
          ls -la build/
            
      - name: Add Entitlements and Sign
        env:
          CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # Import certificate
          echo "$CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          
          # Sign the app
          codesign --force --options runtime \
            --entitlements macos_entitlements.xml \
            --sign "Developer ID Application" \
            "dist/doc-converter.app"
            
      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Create ZIP for notarization
          ditto -c -k --keepParent "dist/doc-converter.app" "dist/doc-converter.zip"
          
          # Submit for notarization
          xcrun notarytool submit "dist/doc-converter.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
            
      - name: Create DMG
        run: |
          hdiutil create -volname "Doc Converter" \
            -srcfolder "dist/doc-converter.app" \
            -ov -format UDZO \
            "dist/doc-converter.dmg"
            
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/ 