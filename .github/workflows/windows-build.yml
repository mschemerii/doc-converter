name: Multi-Platform Build and Test

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check Python version compatibility
      run: |
        python python_version_check.py
    
    - name: Run basic import checks
      run: |
        python -m compileall .

  build:
    needs: lint-and-test
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
            installer: true
          - os: ubuntu-latest
            platform: linux
            ext: ''
            installer: false
          - os: macos-latest
            platform: macos
            ext: ''
            installer: false

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build Executable
      run: |
        pyinstaller --onefile --windowed doc_converter_gui.py
    
    - name: Create Windows Installer
      if: matrix.installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss
        options: /O+
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc-converter-${{ matrix.platform }}
        path: |
          dist/*${{ matrix.ext }}
          Output/*.exe
    
    - name: Create Release
      if: github.event.inputs.release == 'true' || startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*${{ matrix.ext }}
          Output/*.exe
        generate_release_notes: true
